<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ProSharpe Cleaning | Premium Property Cleaning in London</title>
  <meta name="description" content="ProSharpe Cleaning provides professional end of tenancy cleaning, deep cleaning, post-build cleaning and landlord turnaround cleans across London." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root{
      --primary:#0f4c81;
      --primary-dark:#0b3559;
      --accent:#dbeafe;
      --bg:#f7f9fc;
      --white:#ffffff;
      --text:#16202a;
      --muted:#5f6b76;
      --line:#e5eaf0;
      --success:#1f8f5f;
      --shadow:0 12px 35px rgba(15, 76, 129, 0.10);
      --radius:18px;
      --radius-sm:12px;
      --max:1180px;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      font-family:'Inter',sans-serif;
      background:var(--bg);
      color:var(--text);
      line-height:1.6;
    }

    a{
      text-decoration:none;
      color:inherit;
    }

    img{
      max-width:100%;
      display:block;
    }

    .container{
      width:min(92%, var(--max));
      margin:0 auto;
    }

    .topbar{
      background:var(--primary-dark);
      color:#fff;
      font-size:14px;
      text-align:center;
      padding:10px 16px;
    }

    header{
      position:sticky;
      top:0;
      z-index:1000;
      background:rgba(255,255,255,0.95);
      backdrop-filter:blur(10px);
      border-bottom:1px solid var(--line);
    }

    .nav{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:20px;
      padding:18px 0;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      font-weight:800;
      font-size:22px;
      color:var(--primary-dark);
    }

    .brand-mark{
      width:42px;
      height:42px;
      border-radius:12px;
      background:linear-gradient(135deg,var(--primary),var(--primary-dark));
      display:grid;
      place-items:center;
      color:#fff;
      font-weight:800;
      font-size:18px;
      box-shadow:var(--shadow);
      flex-shrink:0;
    }

    .nav-links{
      display:flex;
      align-items:center;
      gap:24px;
      font-weight:600;
      color:var(--text);
    }

    .nav-links a:hover{
      color:var(--primary);
    }

    .nav-cta{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:12px 18px;
      border-radius:999px;
      background:var(--primary);
      color:#fff;
      font-weight:700;
      box-shadow:var(--shadow);
    }

    .hero{
      padding:72px 0 48px;
    }

    .hero-grid{
      display:grid;
      grid-template-columns:1.15fr 0.85fr;
      gap:34px;
      align-items:center;
    }

    .hero h1{
      font-size:clamp(34px,5vw,58px);
      line-height:1.04;
      margin-bottom:18px;
    }

    .hero p{
      font-size:18px;
      color:var(--muted);
      margin-bottom:28px;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:15px 22px;
      border-radius:999px;
      font-weight:700;
    }

    .btn-primary{
      background:var(--primary);
      color:#fff;
    }

    .services-grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:22px;
    }

    .service-card{
      background:#fff;
      border:1px solid var(--line);
      border-radius:22px;
      padding:26px;
    }

    .quote-wrap{
      background:#fff;
      border:1px solid var(--line);
      border-radius:28px;
      overflow:hidden;
    }

    .quote-top{
      padding:28px;
    }

    .quote-card{
      padding:28px;
    }

    .quote-card iframe{
      width:100%;
      min-height:700px;
      border:none;
      border-radius:18px;
    }

    footer{
      padding:30px;
      text-align:center;
      color:var(--muted);
    }
  </style>
</head>

<body>

<div class="topbar">
  Professional cleaning across London
</div>

<header>
  <div class="container nav">
    <div class="brand">
      <div class="brand-mark">PS</div>
      ProSharpe Cleaning
    </div>

    <div class="nav-links">
      <a href="#services">Services</a>
      <a href="#quote">Get Quote</a>
    </div>

    <a href="#quote" class="nav-cta">Book</a>
  </div>
</header>

<section class="hero">
  <div class="container hero-grid">
    <div>
      <h1>Premium Property Cleaning</h1>
      <p>End of tenancy, deep cleaning and landlord turnaround cleans across London.</p>
      <a href="#quote" class="btn btn-primary">Get Quote</a>
    </div>
  </div>
</section>

<section id="services">
  <div class="container services-grid">
    <div class="service-card">
      <h3>End of Tenancy</h3>
    </div>
    <div class="service-card">
      <h3>Deep Cleaning</h3>
    </div>
    <div class="service-card">
      <h3>Landlord Turnaround</h3>
    </div>
  </div>
</section>

<section id="quote">
  <div class="container">
    <div class="quote-wrap">
      <div class="quote-top">
        <h2>Book Now</h2>
      </div>

      <div class="quote-card">
        <iframe
          src="https://prosharpecleaning.simplybook.it/v2/#book"
          title="Booking">
        </iframe>
      </div>

    </div>
  </div>
</section>

<footer>
  © 2026 ProSharpe Cleaning
</footer>

</body>
</html>
